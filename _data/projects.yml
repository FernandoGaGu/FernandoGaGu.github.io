- name: GA-MADRID - design and validation of a machine learning tool for the diagnosis of Alzheimer’s disease and frontotemporal dementia using genetic algorithms
  descr: "This paper presents a framework for data mining and automatic diagnosis in the context of Alzheimer's disease and frontotemporal dementia. Using multi-objective genetic algorithms, we select the most discriminant features based on neuropsychological and neuroimaging data. Subsequently we develop multiclass diagnostic models based on Machine Learning techniques."
  demo: https://link.springer.com/article/10.1007/s11517-022-02630-z
  tags:
    - tag: Genetic algorithms
    - tag: Machine Learning
    - tag: Evolutionary Grammars
    - tag: Automatic diagnostic

- name: Diagnosis of Alzheimer's disease and behavioural variant frontotemporal dementia with machine learning-aided neuropsychological assessment using feature engineering and genetic algorithms
  descr: "In this paper we use Machine Learning techniques for the development of diagnostic models of frontotemporal dementia and Alzheimer's disease based on data from neuropsychological assessments. We combine feature engineering techniques with classical Machine Learning models demonstrating how Artificial Intelligence approaches can be successfully used for the automatic diagnosis of these types of diseases."
  demo: https://doi.org/10.1002/gps.5667
  tags:
    - tag: Feature engineering
    - tag: Machine Learning
    - tag: Automatic diagnostic


- name: Genetic Algorithms for Optimized Diagnosis of Alzheimer’s Disease and Frontotemporal Dementia Using Fluorodeoxyglucose Positron Emission Tomography Imaging
  descr: "In this research, genetic algorithms were applied as a feature engineering technique in conjunction with Machine Learning algorithms for the differential diagnosis of patients with Alzheimer's disease, frontotemporal dementia and different subtypes of Primary Progressive Aphasia."
  demo: https://doi.org/10.3389/fnagi.2021.708932
  tags:
    - tag: Genetic algorithms
    - tag: Machine Learning
    - tag: Automatic diagnostic
